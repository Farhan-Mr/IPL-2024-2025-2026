<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pepsi IPL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#14162e;
color:white;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 5%;
background:#1f2245;
position:relative;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
}

nav{
display:flex;
gap:20px;
}

nav a{
text-decoration:none;
color:#ccc;
font-weight:500;
}

nav a:hover{
color:#ffa500;
}

.hamburger{
display:none;
font-size:28px;
cursor:pointer;
}

/* HERO */

.hero{
text-align:center;
padding:60px 5%;
}

.ipl-title{
color:#ffa500;
font-size:28px;
}

.subtitle{
color:#ccc;
margin-top:5px;
}

/* TEAMS */

.teams{
padding:30px 5%;
text-align:center;
}

.team-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
margin-top:20px;
}

.team-card{
background:#2b2f66;
padding:15px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.team-card:hover{
transform:scale(1.05);
}

/* PLAYERS */

.players{
padding:40px 5%;
text-align:center;
}

.player-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
margin-top:20px;
}

.player-card{
background:#333;
padding:20px;
border-radius:12px;
transition:0.3s;
}

.player-card:hover{
transform:scale(1.05);
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
color:#aaa;
}

/* MOBILE */

@media(max-width:768px){

nav{
position:absolute;
top:70px;
left:0;
width:100%;
background:#1f2245;
flex-direction:column;
display:none;
padding:15px;
}

nav.show{
display:flex;
}

nav a{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.hamburger{
display:block;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/en/2/2e/Indian_Premier_League_Logo.svg">
<h2>Pepsi IPL</h2>
</div>

<div class="hamburger" id="menu">
☰
</div>

<nav id="nav">
<a href="#">Home</a>
<a href="#">Matches</a>
<a href="#">Points Table</a>
<a href="#">Players</a>
</nav>

</header>

<section class="hero">

<h1 class="ipl-title">Indian Premier League</h1>
<p class="subtitle">Matches • Stats • Players • Teams</p>

</section>

<section class="teams">

<h2>IPL Teams</h2>

<div class="team-grid">

<div class="team-card">CSK</div>
<div class="team-card">MI</div>
<div class="team-card">RCB</div>
<div class="team-card">KKR</div>
<div class="team-card">SRH</div>
<div class="team-card">GT</div>
<div class="team-card">RR</div>
<div class="team-card">DC</div>

</div>

</section>

<section class="players">

<h2>Star Players</h2>

<div class="player-grid">

<div class="player-card">
<h3>Virat Kohli</h3>
<p>RCB</p>
</div>

<div class="player-card">
<h3>MS Dhoni</h3>
<p>CSK</p>
</div>

<div class="player-card">
<h3>Rohit Sharma</h3>
<p>MI</p>
</div>

<div class="player-card">
<h3>Shubman Gill</h3>
<p>GT</p>
</div>

</div>

</section>

<footer>

<p>© 2026 IPL Dashboard</p>

</footer>

<script>

const menu=document.getElementById("menu");
const nav=document.getElementById("nav");

menu.addEventListener("click",function(){
nav.classList.toggle("show");
});

</script>

</body>
</html>
