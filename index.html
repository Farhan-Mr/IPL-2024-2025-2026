<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pepsi IPL</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<header class="fadeInDown">

  <div class="logo">
    <img src="/IPL-2024-2025-2026/img/ipl-logo.png">
    <h2>Pepsi IPL</h2>
  </div>

  <div class="hamburger" id="menu">
    ☰
  </div>

  <nav id="nav">
    <a href="index.html">Home</a>
    <a href="matches2026.html">Matches</a>
    <a href="ipl_Table2026.html">Points Table</a>
    <a href="players.html">Players</a>
  </nav>

  <button id="themeToggle">🌙</button>

</header>


<section class="hero slideIn">

  <h1 class="ipl-title">Indian Premier League</h1>

  <p class="subtitle">Matches • Stats • Players • Teams</p>

</section>


<section class="teams">

  <h2 class="fadeInUp">IPL Teams</h2>

  <div class="team-grid">

    <div class="team-card popIn">CSK</div>
    <div class="team-card popIn">MI</div>
    <div class="team-card popIn">RCB</div>
    <div class="team-card popIn">KKR</div>
    <div class="team-card popIn">SRH</div>
    <div class="team-card popIn">GT</div>
    <div class="team-card popIn">RR</div>
    <div class="team-card popIn">DC</div>

  </div>

</section>


<section class="players">

  <h2 class="fadeInUp">Star Players</h2>

  <div class="player-grid">

    <div class="player-card hoverGrow">
      <h3>Virat Kohli</h3>
      <p>RCB</p>
    </div>

    <div class="player-card hoverGrow">
      <h3>MS Dhoni</h3>
      <p>CSK</p>
    </div>

    <div class="player-card hoverGrow">
      <h3>Rohit Sharma</h3>
      <p>MI</p>
    </div>

    <div class="player-card hoverGrow">
      <h3>Shubman Gill</h3>
      <p>GT</p>
    </div>

  </div>

</section>


<footer class="fadeInUp">
  <p>© 2026 IPL Dashboard</p>
</footer>


<script>

const menu = document.getElementById("menu")
const nav = document.getElementById("nav")

menu.onclick = () => {
  nav.classList.toggle("show")
}

const toggle = document.getElementById("themeToggle")

toggle.onclick = () => {
  document.body.classList.toggle("dark")
}

</script>

</body>
</html>
