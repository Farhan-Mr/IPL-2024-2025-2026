<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pepsi IPL</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* ------------------- RESPONSIVE STYLES ------------------- */

/* General Grid Fixes */
.team-grid, .player-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 5%;
  background: #1f2245;
  flex-wrap: wrap;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo img {
  width: 45px;
}

nav {
  display: flex;
  gap: 20px;
}
nav a {
  text-decoration: none;
  color: #ccc;
  font-weight: 500;
}
nav a.active {
  color: #ffa500;
}
.hamburger {
  display: none;
  font-size: 24px;
  cursor: pointer;
}

#themeToggle {
  background: none;
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
}

/* Hero */
.hero {
  padding: 60px 5%;
  text-align: center;
}


@media(max-width:1024px){
  .team-grid, .player-grid {
    gap: 12px;
  }
}

@media(max-width:600px){
  header {
    flex-direction: row;
    justify-content: space-between;
  }
  nav {
    position: absolute;
    top: 70px;
    left: 0;
    width: 100%;
    flex-direction: column;
    display: none;
    background: #1f2245;
    padding: 15px;
    z-index: 10;
  }
  nav.show {
    display: flex;
  }
  nav a {
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .hamburger {
    display: block;
  }

  .hero h1, .hero p {
    font-size: 1.2rem;
  }

  .team-grid, .player-grid {
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  }
}

@media(max-width:480px){
  .logo img {
    width: 35px;
  }
  nav a {
    font-size: 14px;
  }
  .hero h1 {
    font-size: 1rem;
  }
  .hero p {
    font-size: 0.9rem;
  }
  .team-card, .player-card {
    font-size: 0.85rem;
    padding: 8px;
  }
}

#MI_CARD:hover
{
  background-color: #004B8D;
  color: #FFCD32;
}

#RCB_CARD:hover
{
  background-color: #E63329;
  color: #252829;
}

#KKR_CARD:hover
{
  background-color: #3A225D;
  color: #F7D54E;
}
#SRH_card:hover{
  background-color: #EE7429;
  color:  #DC0032;
}

#GT_CARD:hover
{
  background-color: #1B2133;
  color: #DBBE6E;
}
#RR_card:hover
{
  background-color: #074EA2;
  color: #C3A11F;
}
#DC_card:hover
{
 background-color: #2561AE;
 color: #D71921;
}

</style>
</head>

<body>

<header class="fadeInDown">

  <div class="logo">
    <img src="/IPL-2024-2025-2026/img/ipl-logo.png">
    <h2>Pepsi IPL</h2>
  </div>

  <div class="hamburger" id="menu">
    ☰
  </div>

  <nav id="nav">
    <a href="index.html">Home</a>
    <a href="matches2026.html">Matches</a>
    <a href="ipl_Table2026.html">Points Table</a>
    <a href="players.html">Players</a>
  </nav>

  <button id="themeToggle">🌙</button>

</header>

<section class="hero slideIn">
  <h1 class="ipl-title">Indian Premier League</h1>
  <p class="subtitle">Matches • Stats • Players • Teams</p>
</section>

<section class="teams">
  <h2 class="fadeInUp">IPL Teams</h2><br>
  <div class="team-grid">
    <div class="team-card popIn" id="CSK_CARD">CSK</div>
    <div class="team-card popIn" id="MI_CARD">MI</div>
    <div class="team-card popIn" id="RCB_CARD">RCB</div>
    <div class="team-card popIn" id="KKR_CARD">KKR</div>
    <div class="team-card popIn" id="SRH_card">SRH</div>
    <div class="team-card popIn" id="GT_CARD">GT</div>
    <div class="team-card popIn" id="RR_card">RR</div>
    <div class="team-card popIn" id="DC_card">DC</div>
  </div>
</section>

<section class="players">
  <h2 class="fadeInUp">Star Players</h2>
  <div class="player-grid">
    <div class="player-card hoverGrow">
      <h3>Virat Kohli</h3>
      <p>RCB</p>
    </div>
    <div class="player-card hoverGrow">
      <h3>MS Dhoni</h3>
      <p>CSK</p>
    </div>
    <div class="player-card hoverGrow">
      <h3>Rohit Sharma</h3>
      <p>MI</p>
    </div>
    <div class="player-card hoverGrow">
      <h3>Shubman Gill</h3>
      <p>GT</p>
    </div>
  </div>
</section>

<footer class="fadeInUp">
  <p>© 2026 IPL Dashboard</p>
</footer>

<script>
const menu = document.getElementById("menu")
const nav = document.getElementById("nav")

menu.onclick = () => {
  nav.classList.toggle("show")
}

const toggle = document.getElementById("themeToggle")
toggle.onclick = () => {
  document.body.classList.toggle("dark")
}
</script>

</body>
</html>
