<style>
/* BASE STYLING */
* {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body {background:#1e1e2f;color:white;}

/* HEADER */
header {background:#111;padding:15px 5%;display:flex;flex-direction:column;align-items:center;}
.top-bar {display:flex;align-items:center;gap:10px;margin-bottom:10px;font-weight:bold;}
.top-bar img{width:50px;height:50px;}
.main-nav{display:flex;gap:25px;}
.main-nav a{color:#adb5bd;text-decoration:none;font-weight:bold;transition:color 0.3s ease;}
.main-nav a.active, .main-nav a:hover{color:#ffa500;}

/* FILTER */
.filter-section{background:#282968;padding:12px;border-radius:6px;margin:20px auto;width:fit-content;font-weight:bold;}
#year-select{margin-top:5px;padding:5px;border-radius:4px;border:none;background:#444;color:white;}

/* TABLE */
.table-container{max-width:1200px;margin:20px auto;background:#222;border-radius:12px;padding:20px;box-shadow:0 8px 20px rgba(0,0,0,0.4);}
.ipl-table{width:100%;border-collapse:collapse;text-align:center;}
.ipl-table th, .ipl-table td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.1);transition:background 0.3s ease, transform 0.3s ease;}
.ipl-table th{background:#1f2245;color:#ccc;text-transform:uppercase;font-weight:600;}
.ipl-table tbody tr{opacity:0;animation:popInScale 0.5s ease forwards;}
.ipl-table tbody tr:nth-child(1){animation-delay:0.1s;}
.ipl-table tbody tr:nth-child(2){animation-delay:0.2s;}
.ipl-table tbody tr:nth-child(3){animation-delay:0.3s;}
.ipl-table tbody tr:nth-child(4){animation-delay:0.4s;}
.ipl-table tbody tr:nth-child(5){animation-delay:0.5s;}
.ipl-table tbody tr:nth-child(6){animation-delay:0.6s;}
.ipl-table tbody tr:nth-child(7){animation-delay:0.7s;}
.ipl-table tbody tr:nth-child(8){animation-delay:0.8s;}
.ipl-table tbody tr:nth-child(9){animation-delay:0.9s;}
.ipl-table tbody tr:nth-child(10){animation-delay:1s;}
.ipl-table tbody tr:hover{background:#ffa50033;transform:scale(1.02);}

/* TEAM CELL */
.team-cell{display:flex;align-items:center;gap:10px;font-weight:bold;min-width:150px;text-align:left;}
.team-cell img{width:30px;}

/* ANIMATION */
@keyframes popInScale {0%{opacity:0;transform:scale(0.8);}100%{opacity:1;transform:scale(1);}}

/* RESPONSIVE */
@media(max-width:600px){.hide-mobile{display:none;}}
</style>
</head>
